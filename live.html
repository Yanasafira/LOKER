<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live CCTV — Loker Security</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="live.css">
</head>
<body>

  <header class="header">
    <div class="header-left">
      <a href="index.html" class="back-btn">
        <span class="back-arrow">←</span>
        Dashboard
      </a>
      <div class="divider"></div>
      <div class="brand">
        <span class="brand-icon">⬡</span>
        <span class="brand-name">Loker Security · Live</span>
      </div>
    </div>
    <div class="header-right">
      <div class="live-badge">
        <span class="live-dot"></span>
        LIVE
      </div>
      <div class="status-chip">
        <span class="status-dot" id="srvDot"></span>
        <span id="srvLabel">Server</span>
      </div>
      <time class="clock" id="clock">--:--:--</time>
    </div>
  </header>

  <main class="layout">

    <!-- VIDEO -->
    <section class="video-section">
      <div class="video-wrap">
        <img id="cctvImg" src="" alt="CCTV" onerror="streamErr()" onload="streamOk()">
        <div class="video-corners">
          <span class="vc tl"></span>
          <span class="vc tr"></span>
          <span class="vc bl"></span>
          <span class="vc br"></span>
        </div>
        <div class="video-badge" id="recBadge">
          <span class="rec-dot"></span>
          REC
        </div>
        <div class="stream-status" id="streamStatus">Menghubungkan…</div>
      </div>
    </section>

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- DETECTION RESULT -->
      <div class="card result-card" id="resultCard">
        <div class="card-eyebrow">Deteksi Terakhir</div>
        <div class="result-status idle" id="resultStatus">Standby</div>

        <div class="result-rows">
          <div class="result-row">
            <span class="result-key">Nama</span>
            <span class="result-val" id="rNama">—</span>
          </div>
          <div class="result-row">
            <span class="result-key">Kelas</span>
            <span class="result-val" id="rKelas">—</span>
          </div>
          <div class="result-row">
            <span class="result-key">Semester</span>
            <span class="result-val" id="rSem">—</span>
          </div>
          <div class="result-row">
            <span class="result-key">Loker</span>
            <span class="result-val" id="rLoker">—</span>
          </div>
          <div class="result-row">
            <span class="result-key">Jam</span>
            <span class="result-val" id="rJam">—</span>
          </div>
        </div>
      </div>

      <!-- CONFIDENCE -->
      <div class="card conf-card">
        <div class="card-eyebrow">Confidence Score (LBPH)</div>
        <div class="conf-note">Score rendah = lebih mirip wajah</div>

        <div class="conf-bar-wrap">
          <div class="conf-bar-track">
            <div class="conf-bar-fill" id="confFill"></div>
          </div>
          <div class="conf-threshold">
            <div class="threshold-line"></div>
            <span class="threshold-label">50</span>
          </div>
        </div>

        <div class="conf-footer">
          <span id="confNote">Menunggu deteksi wajah…</span>
          <span class="conf-value" id="confValue">—</span>
        </div>
      </div>

      <!-- LOG -->
      <div class="card log-card">
        <div class="card-eyebrow">Log Aktivitas</div>
        <div class="log-list" id="logList">
          <div class="log-item info">
            <span class="log-time">--:--:--</span>
            <span class="log-msg">Sistem aktif…</span>
          </div>
        </div>
      </div>

    </aside>
  </main>

  <script src="live.js"></script>
</body>
</html>
